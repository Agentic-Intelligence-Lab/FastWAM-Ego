# LIBERO-Plus two-camera LeRobot training config.
# The dataset root is expected to contain the four suite directories:
# libero_plus_spatial, libero_plus_object, libero_plus_goal, and libero_plus_10.
dataset_root: /data/datasets/libero_plus_each_suite
suite_dirs:
  - ${data.dataset_root}/libero_plus_spatial
  - ${data.dataset_root}/libero_plus_object
  - ${data.dataset_root}/libero_plus_goal
  - ${data.dataset_root}/libero_plus_10
text_embeds_cache: ${data.dataset_root}/text_embeds_cache/libero_plus
dataset_stats_path: /data/datasets/libero_plus_each_suite/dataset_stats.json

train:
  _target_: fastwam.datasets.lerobot.robot_video_dataset.RobotVideoDataset
  dataset_dirs: ${data.suite_dirs}
  shape_meta:
    images:
      - key: front
        raw_shape: [3, 256, 256]
        shape: [3, 224, 224]
      - key: wrist
        raw_shape: [3, 256, 256]
        shape: [3, 224, 224]
    action:
      - key: default
        raw_shape: 7
        shape: 7
    state:
      - key: default
        raw_shape: 8
        shape: 8
  num_frames: 33
  global_sample_stride: 1
  action_video_freq_ratio: 4
  video_size: [224, 448]
  camera_key: null
  val_set_proportion: 0.0
  is_training_set: true
  pretrained_norm_stats: ${data.dataset_stats_path}
  skip_padding_as_possible: false
  concat_multi_camera: "horizontal"
  processor:
    _target_: fastwam.datasets.lerobot.processors.fastwam_processor.FastWAMProcessor
    shape_meta: ${data.train.shape_meta}
    num_obs_steps: ${data.train.num_frames}
    num_output_cameras: 2
    action_output_dim: 7
    proprio_output_dim: 8
    delta_action_dim_mask:
      default: [true, true, true, true, true, true, false]

    action_state_transforms: null
    use_stepwise_action_norm: False
    norm_default_mode: min/max
    norm_exception_mode: null

    action_state_merger:
      _target_: fastwam.datasets.lerobot.transforms.action_state_merger.ConcatLeftAlign

    train_transforms:
      - _target_: fastwam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [224, 224]
    val_transforms:
      - _target_: fastwam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [224, 224]
  text_embedding_cache_dir: ${data.text_embeds_cache}
  context_len: 128
