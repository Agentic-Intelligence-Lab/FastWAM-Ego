# @package _global_

defaults:
  - train
  - override /task: libero_plus/uncond_2cam224_1e-4
  - _self_

ckpt: null
gpu_id: 0

model:
  load_text_encoder: true
  skip_dit_load_from_pretrain: true
  action_dit_pretrained_path: null

EVALUATION:
  task_suite_name: libero_spatial
  task_id: 0
  num_trials: 1
  output_dir: ./evaluate_results/libero_plus/${hydra:runtime.choices.task}/${now:%Y%m%d_%H%M%S}

  env_num: 1
  num_steps_wait: 30
  replan_steps: 10
  binarize_gripper: true
  use_action_ensembler: false
  visualize_future_video: false

  action_horizon: null
  num_inference_steps: ${eval_num_inference_steps}
  sigma_shift: null
  text_cfg_scale: 1.0
  negative_prompt: ""
  rand_device: cpu
  tiled: false

  dataset_stats_path: null
  device: cuda

LIBERO_PLUS:
  categories:
    - Total
  max_steps: 0  # 0 means use the suite defaults from LIBERO: 400 for spatial/object/goal, 700 for libero_10/90
  task_classification_path: /export/ra/sunxiaoquan/LIBERO-plus/libero/libero/benchmark/task_classification.json

MULTIRUN:
  create_only: false
  task_file: null
  num_gpus: 8
  num_workers: null  # total persistent workers; null uses WORKERS_PER_GPU * visible GPUs
  max_tasks_per_gpu: 1

hydra:
  job:
    chdir: false
  run:
    dir: .
  output_subdir: null
