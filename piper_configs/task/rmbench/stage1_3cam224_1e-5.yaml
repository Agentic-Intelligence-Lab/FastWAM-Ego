# @package _global_

defaults:
  - override /data: rmbench
  - override /model: fastwam
  - _self_

output_dir: /data/models/Motus_FastWAM/stage1/rmbench_stage1_3cam224_1e-5/${now:%Y-%m-%d}_${now:%H-%M-%S}
pretrain: true

batch_size: 8
num_workers: 4

lr_scheduler_type: "cosine"
learning_rate: 1.0e-5
num_epochs: 2
max_steps: null
log_every: 10
save_every: 2000
eval_every: 0

gradient_accumulation_steps: 1
weight_decay: 1.0e-2
resume: null

wandb:
  enabled: false
  project: fast-wam-rmbench
  name: rmbench_stage1_3cam224
  group: rmbench
  mode: offline

model:
  mot_checkpoint_mixed_attn: false
