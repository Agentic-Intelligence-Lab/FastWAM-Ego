# @package _global_

defaults:
  - override /data: libero_plus_2cam
  - override /model: fastwam
  - _self_

pretrain: true
output_dir: /data/models/fastwam_libero_plus_ckpts/libero_plus_uncond_2cam224_1e-4/${now:%Y-%m-%d}_${now:%H-%M-%S}

# dataloading
batch_size: 20
num_workers: 4

model:
  mot_checkpoint_mixed_attn: false

# scheduler
lr_scheduler_type: "cosine"
learning_rate: 1e-4
num_epochs: 2
max_steps: null
log_every: 10
save_every: 5000
eval_every: 1000

# training
gradient_accumulation_steps: 1
weight_decay: 1e-2
resume: null

wandb:
  name: libero_plus_uncond_2cam224_1e-4
  group: libero_plus
