train:
  _target_: fastwam.datasets.mixed_train_dataset.MixedTrainDataset
  ego_repeat_factor: 0.25
  robot:
    _target_: fastwam.datasets.lerobot.robot_video_dataset.RobotVideoDataset
    dataset_dirs:
      - ./data/robotwin2.0/robotwin2.0
    shape_meta:
      images:
        - key: cam_high
          raw_shape: [3, 480, 640]
          shape: [3, 240, 320]
        - key: cam_left_wrist
          raw_shape: [3, 480, 640]
          shape: [3, 240, 320]
        - key: cam_right_wrist
          raw_shape: [3, 480, 640]
          shape: [3, 240, 320]
      action:
        - key: default
          raw_shape: 14
          shape: 14
      state:
        - key: default
          raw_shape: 14
          shape: 14
    num_frames: 33
    global_sample_stride: 1
    action_video_freq_ratio: 4
    video_size: [384, 320]
    camera_key: null
    val_set_proportion: 0.01
    is_training_set: true
    pretrained_norm_stats: ./data/robotwin2.0/dataset_stats.json
    skip_padding_as_possible: false
    concat_multi_camera: "robotwin"
    processor:
      _target_: fastwam.datasets.lerobot.processors.fastwam_processor.FastWAMProcessor
      shape_meta: ${data.train.robot.shape_meta}
      num_obs_steps: ${data.train.robot.num_frames}
      num_output_cameras: 3
      action_output_dim: 14
      proprio_output_dim: 14
      action_state_transforms: null
      use_stepwise_action_norm: False
      norm_default_mode: "z-score"
      norm_exception_mode: null
      action_state_merger:
        _target_: fastwam.datasets.lerobot.transforms.action_state_merger.ConcatLeftAlign
      train_transforms:
        - _target_: fastwam.datasets.lerobot.transforms.image.ToTensor
        - _target_: torchvision.transforms.Resize
          size: [240, 320]
      val_transforms:
        - _target_: fastwam.datasets.lerobot.transforms.image.ToTensor
        - _target_: torchvision.transforms.Resize
          size: [240, 320]
    text_embedding_cache_dir: ./data/text_embeds_cache/robotwin
    context_len: 128
  ego:
    _target_: fastwam.datasets.ego.ego_verse_video_dataset.EgoVerseVideoDataset
    dataset_root: /mnt/data/yuanmingqi/datasets/EgoVerseData_fold_clothes
    num_frames: 33
    action_video_freq_ratio: 4
    video_size: [384, 320]
    action_dim: 14
    proprio_dim: 14
    image_key: images.front_1
    obs_stride: 1
    text_embedding_cache_dir: ./data/text_embeds_cache/egoverse_fold_clothes
    context_len: 128
    val_set_proportion: 0.0
    is_training_set: true

val:
  _target_: fastwam.datasets.lerobot.robot_video_dataset.RobotVideoDataset
  dataset_dirs:
    - ./data/robotwin2.0/robotwin2.0/
  shape_meta:
    images:
      - key: cam_high
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
      - key: cam_left_wrist
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
      - key: cam_right_wrist
        raw_shape: [3, 480, 640]
        shape: [3, 240, 320]
    action:
      - key: default
        raw_shape: 14
        shape: 14
    state:
      - key: default
        raw_shape: 14
        shape: 14
  num_frames: 33
  global_sample_stride: 1
  action_video_freq_ratio: 4
  video_size: [384, 320]
  camera_key: null
  val_set_proportion: 0.01
  is_training_set: false
  pretrained_norm_stats: ./data/robotwin2.0/dataset_stats.json
  skip_padding_as_possible: false
  concat_multi_camera: "robotwin"
  processor:
    _target_: fastwam.datasets.lerobot.processors.fastwam_processor.FastWAMProcessor
    shape_meta: ${data.train.robot.shape_meta}
    num_obs_steps: ${data.train.robot.num_frames}
    num_output_cameras: 3
    action_output_dim: 14
    proprio_output_dim: 14
    action_state_transforms: null
    use_stepwise_action_norm: False
    norm_default_mode: "z-score"
    norm_exception_mode: null
    action_state_merger:
      _target_: fastwam.datasets.lerobot.transforms.action_state_merger.ConcatLeftAlign
    train_transforms:
      - _target_: fastwam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [240, 320]
    val_transforms:
      - _target_: fastwam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [240, 320]
  text_embedding_cache_dir: ./data/text_embeds_cache/robotwin
  context_len: 128
